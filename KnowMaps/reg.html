<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowMap</title>
    <link rel="stylesheet" href="css/ger.css">
</head>
<body>

    <header id="menu-head" class="menu-head">
        <div class="menu1">
            <p onclick="window.location.href=''" class="KnowMap">KnowMap</p>
            <p onclick="window.location.href='/akkaynt.html'" class="Akkaynt">Аккаунт</p>
        <p onclick="alert(`К сожеление данный раздел пока не доступен`)" class="History">История</p>
        <p onclick="alert(`К сожеление данный раздел пока не доступен`)" class="Nastr">Настройки</p>
        <p onclick="window.location.href=`FAQ.html`" class="FAQ">FAQ</p>
        </div>
    </header>

<div class="entrance_user" id="entrance_user">
    <h1 class="window_title">Вход</h1>
        <div class="main_window">
            
            <div class="gridEmail">
                <p class="signature_window_email">
                    Почта:</p>
                <div class="title_error_and_window_input_email">
                    <p class="p_input_window_email">
                        <input type="email" 
                            class="input_window_email"
                            id="window_email_data">
                    </p>
                    <div class="title_error_email" id="title_error_email">ⓘ
                        <div class="error_email">
                            <div class="the_figure_is_an_error_two_email"></div>
                                <pre class="detailed_error_email">
Ошибка, почта введена неверно или нет 
пользователя с такой почтой!</pre>
                        </div>
                    </div>
                </div>
            </div>
            <div class="gridRegister">
                <p class="password_signature_window" style="font-size: 18px;">
                    Пароль:</p>
                <div class="title_error_and_window_input_password">
                    <p class="p_password_input_window">
                        <input type="password" 
                            class="password_input_window"
                            id="window_password_data">
                    </p>
                    <div class="title_error_password" id="title_error_password">ⓘ
                        <div class="error_password">
                            <div class="the_figure_is_an_error_two"></div>
                                <pre class="detailed_error_password">
Ошибка, пароль неверный или нет 
пользователя с таким паролем!</pre>
                        </div>
                    </div>
                </div>
            </div>
            <div class="button">
                <button class="register_button" id="registerButton">Регистрация</button>
                <button class="button_entrance" id="buttonEntrance">Вход</button>
            </div>
        </div>
</div>
<script src="java/reg.js" type="module"></script>
</body>
</html>
