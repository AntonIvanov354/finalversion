<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowMap</title>
    <link rel="stylesheet" href="css/akkayn.css">
    <link rel="website icon" type="png" href="foto/logo__ved_sait.png">
    <script src="./java/account.js"></script>
    <link rel="stylesheet" href="./css/account.css">

</head>
<img>

<header id="menu-head" class="menu-head">
    <div class="menu1">
        <p onclick="window.location.href='glav1.html'" class="KnowMap">KnowMap</p>
        <p onclick="window.location.href='account.html'" class="Akkaynt" id="Akkaynt">Аккаунт</p>
        <p onclick="alert(`К сожеление данный раздел пока не доступен`)" class="History">История</p>
        <p onclick="alert(`К сожеление данный раздел пока не доступен`)" class="Nastr">Настройки</p>
        <p onclick="window.location.href=`FAQ.html`" class="FAQ">FAQ</p>
    </div>
</header>
<main>
    <div class="main_window_account">
        <div class="window_profile_left">
            <div class="window_profile">
                <img src="./foto/profile_photo.png" 
                     alt="фото профиля" 
                     class="profile_photo">
                <p class="title_beggining_email" id="title_beggining_email"></p>
            </div>
        </div>

        <div class="window_profile_right">
            <div class="window_left_info_user" id="window_left_info_user">
                <div class="window_info">
                    <div class="window_info_name">
                        <p class="title_name_user_info">Имя пользователя:</p>
                        <p class="window_name" id="window_email">User1 и т.д.</p>
                    </div>
                    <div class="window_info_email">
                        <p class="title_email_user_info">Почта:</p>
                        <p class="window_email">abama@gmail.com</p>
                    </div>
                    <div class="window_info_password">
                        <p class="title_password_user_info">Пароль:</p>
                        <p class="window_password" id="window_password">********</p>
                    </div>
                    <button class="window_info_button_settings"
                            id="window_info_button_settings">
                            Настройки данных аккаунта</button>
                </div>
                <div class="seting_user_data" id="seting_user_data" style="display: none;">
                    <div class="window_option_name">
                        <p class="title_name_user_option">Введите новое имя пользователя:</p>
                        <p class="options_window_name_options">
                            <input class="window_name_option"
                            id="window_name_option"
                            type="text">
                        </p>
                    </div>
                    <div class="none_window"></div>
                    <button class="window_options_button_settings"
                        id="window_options_button_settings">
                        Сохранить новые данные</button>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
